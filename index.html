<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>hand tracking </title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace;
        }
        #container { position: relative; width: 100vw; height: 100vh; }
        video {
            position: absolute; width: 100%; height: 100%;
            object-fit: cover; transform: scaleX(-1); z-index: 1;
            opacity: 0.12; display: none;
        }
        canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2; pointer-events: none; display: none;
        }

        /* --- SCREEN TERMINAL MOBILE --- */
        #hacker-terminal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 20; color: #00ff33; padding: 15px;
            box-sizing: border-box; overflow: hidden; font-size: 13px; line-height: 1.6;
        }
        .cursor { display: inline-block; width: 8px; height: 15px; background: #00ff33; animation: blink 0.8s infinite; }
        @keyframes blink { 0%, 49% { background: #00ff33; } 50%, 100% { background: transparent; } }

        /* --- HUD MOBILE OVERLAY --- */
        #hud-overlay {
            position: absolute; top: 8%; left: 50%; transform: translateX(-50%);
            z-index: 10; color: #ffcc00; text-align: center;
            pointer-events: none; display: none; width: 90%;
        }
        #hud-overlay h1 { margin: 0; font-size: 20px; letter-spacing: 2px; font-weight: 800; text-shadow: 0 0 10px rgba(255,204,0,0.6); }
        #hud-overlay p { margin: 10px 0 0 0; font-size: 12px; color: #ffffff; background: rgba(0,0,0,0.75); padding: 8px 12px; border-radius: 15px; border: 1px solid #ffcc00; line-height: 1.4; }
    </style>
</head>
<body>

<div id="container">
    <div id="hacker-terminal">
        <div id="terminal-log"></div>
        <span class="cursor"></span>
    </div>

    <div id="hud-overlay">
        <h1 id="hud-title">GERBANG TERKUNCI</h1>
        <p id="hud-desc">Menginisialisasi modul sensor kamera depan...</p>
    </div>

    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="canvas3d"></canvas>

    <audio id="bg-music" src="sofia.mp3" preload="auto"></audio>
</div>

<script>
    const terminalLog = document.getElementById('terminal-log');
    const terminalScreen = document.getElementById('hacker-terminal');
    const hudOverlay = document.getElementById('hud-overlay');
    const hudTitle = document.getElementById('hud-title');
    const hudDesc = document.getElementById('hud-desc');
    const videoElement = document.getElementById('webcam');
    const canvasElement = document.getElementById('canvas3d');
    const bgMusic = document.getElementById('bg-music');

    let videoOpened = false;
    let targetMode = 0;
    let animationTimer = 0.0;
    let gameStage = "terminal";
    let unlockProgress = 0.0;

    // Variabel untuk Slide Show JPG
    let slideMesh;
    let textures = [];
    let currentSlideIdx = 0;
    let lastSlideSwitchTime = 0;
    const SLIDE_INTERVAL = 2.0; // Ganti gambar setiap 2 detik saat gestur OK aktif

    const HAND_CONNECTIONS = [
        [0, 1], [1, 2], [2, 3], [3, 4], [0, 5], [5, 6], [6, 7], [7, 8],
        [5, 9], [9, 10], [10, 11], [11, 12], [9, 13], [13, 14], [14, 15], [15, 16],
        [13, 17], [17, 18], [18, 19], [19, 20], [0, 17]
    ];

    const logs = [
        "MOBILE_SYS: Memulai bypass protokol pelindung...",
        "DECRYPT: Membuka enkripsi biometrik... SUCCESS",
        "CONNECTING: Sinkronisasi core DIVA 3D Mobile...",
        "WARNING: Pintu pelindung gerbang terdeteksi.",
        "SYS_REQ: Dekatkan telapak tangan untuk verifikasi.",
        "STARTING_CAMERA..."
    ];

    let logIdx = 0;
    function runTerminal() {
        if (logIdx < logs.length) {
            const p = document.createElement('div');
            p.innerText = logs[logIdx];
            terminalLog.appendChild(p);
            logIdx++;
            setTimeout(runTerminal, 500);
        } else {
            setTimeout(() => {
                terminalScreen.style.display = "none";
                canvasElement.style.display = "block";
                videoElement.style.display = "block";
                hudOverlay.style.display = "block";
                gameStage = "locked";
                initThreeEngine();
                initMediaPipe();
            }, 500);
        }
    }
    window.onload = runTerminal;

    // THREE.JS SCENE SETUP
    let scene, camera3d, renderer, particleSystem;
    let gateGroup, keyGroup;
    let posHeart = [], posButterfly = [];
    let posTextDiva, posTextDivaAp, posTextSofia, posTextNama, posTextHai;
    let handLinesGeometry, handLinesMesh, handJointsGeometry, handJointsMesh;

    const NUM_PARTICLES = 5000;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(NUM_PARTICLES * 3);
    const colors = new Float32Array(NUM_PARTICLES * 3);

    function initThreeEngine() {
        scene = new THREE.Scene();
        camera3d = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
        renderer = new THREE.WebGLRenderer({ canvas: canvasElement, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        camera3d.position.z = 9;

        // LOAD DAFTAR 5 JPG KAMU DI SINI
        const textureLoader = new THREE.TextureLoader();
        for (let i = 1; i <= 5; i++) {
            textures.push(textureLoader.load(`gambar${i}.jpg`));
        }

        // BUAT PINGGIRAN / WADAH SLIDE SHOW (BENTUK KOTAK POTRET HP)
        const slideGeo = new THREE.PlaneGeometry(1.6, 2.4);
        const slideMat = new THREE.MeshBasicMaterial({ 
            map: textures[0], 
            transparent: true, 
            opacity: 0.0, 
            side: THREE.DoubleSide 
        });
        slideMesh = new THREE.Mesh(slideGeo, slideMat);
        slideMesh.position.set(0, 0, 0);
        scene.add(slideMesh);

        // GERBANG LOGIC
        gateGroup = new THREE.Group();
        const doorMat = new THREE.MeshStandardMaterial({ color: 0x3d2314, roughness: 0.8, metalness: 0.2 });
        const leftDoorGeo = new THREE.BoxGeometry(0.65, 1.8, 0.08);
        const leftDoor = new THREE.Mesh(leftDoorGeo, doorMat);
        leftDoor.position.x = -0.33;
        const rightDoor = leftDoor.clone();
        rightDoor.position.x = 0.33;
        const frameGeo = new THREE.BoxGeometry(1.5, 2.0, 0.12);
        const frameMat = new THREE.MeshStandardMaterial({ color: 0x1f2022, roughness: 0.9 });
        const frame = new THREE.Mesh(frameGeo, frameMat);
        frame.position.z = -0.04;
        const plateGeo = new THREE.CylinderGeometry(0.14, 0.14, 0.015, 32);
        const plateMat = new THREE.MeshStandardMaterial({ color: 0xc49a45, metalness: 0.8, roughness: 0.3 });
        const lockPlate = new THREE.Mesh(plateGeo, plateMat);
        lockPlate.rotation.x = Math.PI / 2;
        lockPlate.position.z = 0.04;
        gateGroup.add(frame, leftDoor, rightDoor, lockPlate);
        scene.add(gateGroup);

        // KUNCI EMAS
        keyGroup = new THREE.Group();
        const goldMat = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.9, roughness: 0.15 });
        const handleGeo = new THREE.TorusGeometry(0.11, 0.03, 8, 32);
        const handle = new THREE.Mesh(handleGeo, goldMat);
        handle.position.y = 0.2;
        const shaftGeo = new THREE.CylinderGeometry(0.018, 0.018, 0.35, 16);
        const shaft = new THREE.Mesh(shaftGeo, goldMat);
        shaft.position.y = 0.02;
        const bitGeo = new THREE.BoxGeometry(0.09, 0.09, 0.02);
        const bit = new THREE.Mesh(bitGeo, goldMat);
        bit.position.set(0.04, -0.1, 0);
        keyGroup.add(handle, shaft, bit);
        scene.add(keyGroup);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        const pointLight = new THREE.PointLight(0xffaa44, 2, 15);
        pointLight.position.set(0, 1.5, 2);
        scene.add(ambientLight, pointLight);

        posTextDiva = getTextCoordinates("DIVA", NUM_PARTICLES, 0.018);
        posTextDivaAp = getTextCoordinates("DIVA APRILIYANA", NUM_PARTICLES, 0.012);
        posTextSofia = getTextCoordinates("PLAYING SOFIA", NUM_PARTICLES, 0.013);
        posTextNama = getTextCoordinates("NAMA SAYA", NUM_PARTICLES, 0.015);
        posTextHai = getTextCoordinates("HAI SEMUANYA", NUM_PARTICLES, 0.014);

        for (let i = 0; i < NUM_PARTICLES; i++) {
            let t = Math.random() * Math.PI * 2 - Math.PI;
            let p = Math.random() * Math.PI * 2 - Math.PI;
            posHeart.push(
                2 * Math.pow(Math.sin(t), 3) * 0.45,
                (2 * Math.cos(t) - 0.7 * Math.cos(2*t) - 0.3 * Math.cos(3*t) - 0.1 * Math.cos(4*t)) * 0.45 + 0.1,
                Math.sin(p) * 0.2
            );
            let bt = Math.random() * Math.PI * 2;
            let br = Math.exp(Math.cos(bt)) - 2 * Math.cos(4*bt) + Math.pow(Math.sin(bt/12), 5);
            posButterfly.push(br * Math.sin(bt) * 0.25, br * Math.cos(bt) * 0.25, (Math.random() - 0.5) * 0.2);

            positions[i*3] = (Math.random() - 0.5) * 4;
            positions[i*3+1] = (Math.random() - 0.5) * 6;
            positions[i*3+2] = -2 + (Math.random() - 0.5) * 2;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const shaderMaterial = new THREE.ShaderMaterial({
            vertexShader: `attribute vec3 color; varying vec3 vColor; void main() { vColor = color; vec4 mvPosition = modelViewMatrix * vec4(position, 1.0); gl_PointSize = (40.0 / -mvPosition.z); gl_Position = projectionMatrix * mvPosition; }`,
            fragmentShader: `varying vec3 vColor; void main() { float dist = distance(gl_PointCoord, vec2(0.5)); float glow = pow(1.0 - dist, 4.0); if (glow < 0.01) discard; gl_FragColor = vec4(vColor * glow * 3.0, glow); }`,
            transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
        });

        particleSystem = new THREE.Points(geometry, shaderMaterial);
        scene.add(particleSystem);

        handLinesGeometry = new THREE.BufferGeometry();
        handLinesPositions = new Float32Array(HAND_CONNECTIONS.length * 2 * 3);
        handLinesGeometry.setAttribute('position', new THREE.BufferAttribute(handLinesPositions, 3));
        handLinesMesh = new THREE.LineSegments(handLinesGeometry, new THREE.LineBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.7 }));
        scene.add(handLinesMesh);

        handJointsGeometry = new THREE.BufferGeometry();
        handJointsPositions = new Float32Array(21 * 3);
        handJointsGeometry.setAttribute('position', new THREE.BufferAttribute(handJointsPositions, 3));
        const jointShaderMaterial = new THREE.ShaderMaterial({
            vertexShader: `void main() { vec4 mvPosition = modelViewMatrix * vec4(position, 1.0); gl_PointSize = 9.0; gl_Position = projectionMatrix * mvPosition; }`,
            fragmentShader: `void main() { float dist = distance(gl_PointCoord, vec2(0.5)); if (dist > 0.5) discard; gl_FragColor = vec4(0.0, 1.0, 0.8, 1.0 - (dist * 2.0)); }`,
            transparent: true, blending: THREE.AdditiveBlending
        });
        handJointsMesh = new THREE.Points(handJointsGeometry, jointShaderMaterial);
        scene.add(handJointsMesh);

        animate();
    }

    function getTextCoordinates(text, count, scaleSpace) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 320; canvas.height = 80;
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 26px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(text, canvas.width / 2, canvas.height / 2);
        
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        const points = [];
        for (let y = 0; y < canvas.height; y += 2) {
            for (let x = 0; x < canvas.width; x += 2) {
                if (imgData[(y * canvas.width + x) * 4] > 128) {
                    points.push({ x: (x - canvas.width / 2) * scaleSpace, y: -(y - canvas.height / 2) * scaleSpace });
                }
            }
        }
        const coords = [];
        for (let i = 0; i < count; i++) {
            if (points.length > 0) {
                const pt = points[i % points.length];
                coords.push(pt.x, pt.y, (Math.random() - 0.5) * 0.08);
            } else { coords.push(0, 0, 0); }
        }
        return coords;
    }

    function onResults(results) {
        if(gameStage === "locked") {
            hudDesc.innerText = "Kamera Aktif! Gerakkan telapak tangan Anda untuk memandu KUNCI EMAS masuk ke tengah lingkaran pintu.";
        }

        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const landmarks = results.multiHandLandmarks[0];
            const linesAttr = handLinesGeometry.attributes.position;
            const jointsAttr = handJointsGeometry.attributes.position;
            const aspect = window.innerWidth / window.innerHeight;
            let lineIndex = 0;

            landmarks.forEach((lm, idx) => {
                const x3d = -(lm.x - 0.5) * 5.2 * aspect; 
                const y3d = -(lm.y - 0.5) * 6.5;
                const z3d = -lm.z * 4.0;
                jointsAttr.array[idx * 3] = x3d;
                jointsAttr.array[idx * 3 + 1] = y3d;
                jointsAttr.array[idx * 3 + 2] = z3d;
            });

            if (gameStage === "locked") {
                const hX = jointsAttr.array[0];
                const hY = jointsAttr.array[1];
                const hZ = jointsAttr.array[2];
                keyGroup.position.set(hX, hY, hZ);
                const distanceToHole = Math.sqrt(hX*hX + hY*hY);

                if (distanceToHole < 0.35) {
                    unlockProgress += 0.035;
                    hudTitle.innerText = `DECRYPTING: ${Math.floor(unlockProgress * 100)}%`;
                    hudTitle.style.color = "#00ff33";
                    
                    if (unlockProgress >= 1.0) {
                        gameStage = "unlocked";
                        animationTimer = 5.0;
                        hudTitle.innerText = "ACCESS GRANTED";
                        hudDesc.innerText = "Gunakan gestur jari tangan Anda. Coba buat simbol OK (3 jari tegak) untuk slide show.";
                        scene.remove(keyGroup);
                        setTimeout(() => { hudOverlay.style.opacity = "0"; }, 3000);
                    }
                } else {
                    if(unlockProgress > 0) unlockProgress -= 0.01;
                    hudTitle.innerText = "GERBANG TERKUNCI";
                    hudTitle.style.color = "#ffcc00";
                }
                return;
            }

            handLinesMesh.visible = true;
            handJointsMesh.visible = true;

            HAND_CONNECTIONS.forEach((conn) => {
                const startNode = conn[0]; const endNode = conn[1];
                linesAttr.array[lineIndex++] = jointsAttr.array[startNode * 3];
                linesAttr.array[lineIndex++] = jointsAttr.array[startNode * 3 + 1];
                linesAttr.array[lineIndex++] = jointsAttr.array[startNode * 3 + 2];
                linesAttr.array[lineIndex++] = jointsAttr.array[endNode * 3];
                linesAttr.array[lineIndex++] = jointsAttr.array[endNode * 3 + 1];
                linesAttr.array[lineIndex++] = jointsAttr.array[endNode * 3 + 2];
            });
            jointsAttr.needsUpdate = true;
            handLinesGeometry.attributes.position.needsUpdate = true;

            // AMBIL STATUS JARI
            const indexUp = landmarks[8].y < landmarks[6].y;
            const middleUp = landmarks[12].y < landmarks[10].y;
            const ringUp = landmarks[16].y < landmarks[14].y;
            const pinkyUp = landmarks[20].y < landmarks[18].y;
            const thumbUp = landmarks[4].y < landmarks[3].y;
            const fingersUpCount = [indexUp, middleUp, ringUp, pinkyUp].filter(Boolean).length;

            // UKUR JARAK JEMPOL & TELUNJUK UNTUK GESTUR "OK"
            const thumbTip = landmarks[4];
            const indexTip = landmarks[8];
            const distanceThumbIndex = Math.sqrt(Math.pow(thumbTip.x - indexTip.x, 2) + Math.pow(thumbTip.y - indexTip.y, 2));

            particleSystem.position.x = jointsAttr.array[0];
            particleSystem.position.y = jointsAttr.array[1];

            let mode = 0;

            // LOGIKA SELEKSI GESTUR SINKRON
            if (distanceThumbIndex < 0.06 && middleUp && ringUp && pinkyUp) {
                mode = 10; // MODE 10: GESTUR "OK" AKTIFKAN SLIDE SHOW JPG
            }
            else if (indexUp && !middleUp && !ringUp && !pinkyUp) {
                mode = 2; // MODE 2: PLAY SOFIA AUDIO
                if (!videoOpened) { 
                    bgMusic.play().catch(err => console.log(err));
                    videoOpened = true; 
                }
            } 
            else if (fingersUpCount === 0 && !thumbUp) { 
                mode = 4; // KEPAL: RE-STOP AUDIO
                if (videoOpened) {
                    bgMusic.pause(); bgMusic.currentTime = 0; videoOpened = false;
                }
            } 
            else if (indexUp && pinkyUp && !middleUp && !ringUp) { mode = 8; }
            else if (pinkyUp && !indexUp && !middleUp && !ringUp) { mode = 9; }
            else if (fingersUpCount === 4 && thumbUp) { mode = 1; }
            else if (thumbUp && fingersUpCount === 0) { mode = 5; }
            else if (fingersUpCount === 2 && indexUp && middleUp && !ringUp && !pinkyUp) { mode = 3; }

            if(mode !== 0) { targetMode = mode; animationTimer = 5.0; }
        } else {
            if(gameStage === "unlocked") {
                handLinesMesh.visible = false;
                handJointsMesh.visible = false;
            }
        }
    }

    const clock = new THREE.Clock();
    function animate() {
        requestAnimationFrame(animate);
        const time = clock.getElapsedTime();
        const posAttr = geometry.attributes.position;
        const colorAttr = geometry.attributes.color;

        if (gameStage === "locked") {
            gateGroup.position.z = Math.sin(time) * 0.05;
            keyGroup.rotation.y = time * 0.5;
        } else if (gameStage === "unlocked" && gateGroup.position.z > -15) {
            gateGroup.position.z -= 0.12;
            gateGroup.scale.multiplyScalar(0.97);
            if(gateGroup.position.z <= -14) scene.remove(gateGroup);
        }

        if (animationTimer > 0) { animationTimer -= 0.015; } else { 
            if(gameStage === "unlocked") targetMode = 0; 
        }

        // --- SISTEM SLIDE SHOW TRANSISI ---
        if (gameStage === "unlocked" && targetMode === 10) {
            // Munculkan Slide Show secara halus (Fade-In)
            slideMesh.material.opacity += (0.85 - slideMesh.material.opacity) * 0.1;
            
            // Efek melayang dramatis mengikuti posisi telapak tangan
            slideMesh.position.x += (particleSystem.position.x - slideMesh.position.x) * 0.1;
            slideMesh.position.y += (particleSystem.position.y - slideMesh.position.y) * 0.1;
            slideMesh.rotation.y = Math.sin(time * 1.5) * 0.15; // Berayun sedikit

            // Hitung interval waktu pergantian gambar otomatis
            if (time - lastSlideSwitchTime > SLIDE_INTERVAL) {
                currentSlideIdx = (currentSlideIdx + 1) % textures.length;
                slideMesh.material.map = textures[currentSlideIdx];
                slideMesh.material.needsUpdate = true;
                lastSlideSwitchTime = time;
            }
        } else {
            // Sembunyikan Slide Show secara halus jika gestur diubah (Fade-Out)
            slideMesh.material.opacity += (0.0 - slideMesh.material.opacity) * 0.15;
        }

        // ROTASI PARTIKEL UTAMA
        if (targetMode === 5 || targetMode === 3 || targetMode === 2 || targetMode === 10) {
            let rotSpeed = (targetMode === 2 || targetMode === 10) ? 0.3 : 0.7;
            particleSystem.rotation.y = time * rotSpeed;
            particleSystem.rotation.x = Math.sin(time * 0.2) * 0.1;
        } else { 
            particleSystem.rotation.set(0, Math.sin(time * 0.2) * 0.08, 0); 
        }

        for (let i = 0; i < NUM_PARTICLES; i++) {
            let tx = 0, ty = 0, tz = 0;
            let r = 0, g = 0, b = 0;

            if (gameStage === "locked") {
                let angle = i * 0.06 + time * 0.45;
                let radius = 0.8 + Math.sin(i * 3 + time) * 0.2;
                tx = Math.sin(angle) * radius;
                ty = Math.cos(angle) * radius;
                tz = Math.sin(time + i) * 0.15;
                r = 0.9 * (1.0 - unlockProgress); g = 0.4 + (unlockProgress * 0.6); b = 0.1;
            } else {
                switch(targetMode) {
                    case 10: // MODE OK: PARTIKEL MEMBENTUK BINGKAI GLOWING DI SEKITAR GAMBAR JPG
                        let angleFrame = (i / NUM_PARTICLES) * Math.PI * 2;
                        let framePulse = 1.0 + Math.sin(time * 3.0 + i) * 0.03;
                        tx = Math.sin(angleFrame) * 1.1 * framePulse;
                        ty = Math.cos(angleFrame) * 1.5 * framePulse;
                        tz = Math.sin(time * 2.0 + i) * 0.1;
                        r = 0.0; g = 1.0; b = 0.9; // Warna Cyan Neon melingkari gambar
                        break;
                    case 5:
                        let pulse = 1.0 + 0.12 * Math.sin(time * 5.0);
                        tx = posHeart[i*3] * pulse; ty = posHeart[i*3+1] * pulse; tz = posHeart[i*3+2] * pulse;
                        r = 1.0; g = 0.02; b = 0.2;
                        break;
                    case 3:
                        tx = posButterfly[i*3]; ty = posButterfly[i*3+1];
                        tz = Math.sin(time * 6.0 + Math.abs(tx) * 2.0) * Math.abs(tx) * 0.25;
                        r = 0.0; g = 0.8; b = 1.0;
                        break;
                    case 4: tx = posTextDiva[i*3]; ty = posTextDiva[i*3+1]; tz = posTextDiva[i*3+2]; r = 1.0; g = 0.1; b = 0.5; break;
                    case 8: tx = posTextDivaAp[i*3]; ty = posTextDivaAp[i*3+1]; tz = posTextDivaAp[i*3+2]; r = 1.0; g = 0.7; b = 0.0; break;
                    case 2:
                        tx = posTextSofia[i*3]; ty = posTextSofia[i*3+1]; 
                        tz = posTextSofia[i*3+2] + Math.sin(time * 4.5 + tx * 3.5) * 0.15; 
                        r = 0.0; g = 0.4; b = 1.0; 
                        break;
                    case 9: tx = posTextNama[i*3]; ty = posTextNama[i*3+1]; tz = posTextNama[i*3+2]; r = 0.0; g = 1.0; b = 0.6; break;
                    case 1: tx = posTextHai[i*3]; ty = posTextHai[i*3+1]; tz = posTextHai[i*3+2]; r = 0.5; g = 0.0; b = 1.0; break;
                    default:
                        tx = Math.sin(i * 0.5) * (2.2 + Math.sin(time) * 0.8);
                        ty = Math.cos(i * 0.5) * (3.8 + Math.sin(time) * 1.0);
                        tz = -10 + Math.cos(time + i) * 1.5;
                        r = 0.0; g = 1.0; b = 0.5;
                        break;
                }
            }

            let waveEffect = (gameStage === "unlocked" && targetMode !== 0 && targetMode !== 10) ? Math.sin(time * 4.0 + tx) * 0.04 : 0;
            posAttr.array[i*3] += (tx - posAttr.array[i*3]) * 0.08;
            posAttr.array[i*3+1] += (ty + waveEffect - posAttr.array[i*3+1]) * 0.08;
            posAttr.array[i*3+2] += (tz - posAttr.array[i*3+2]) * 0.08;

            let intensity = (gameStage === "locked") ? 1.0 : Math.min(animationTimer, 1.0);
            if(gameStage === "unlocked" && targetMode === 0) intensity = 0.35;
            
            colorAttr.array[i*3] = r * intensity;
            colorAttr.array[i*3+1] = g * intensity;
            colorAttr.array[i*3+2] = b * intensity;
        }

        posAttr.needsUpdate = true;
        colorAttr.needsUpdate = true;
        renderer.render(scene, camera3d);
    }

    function initMediaPipe() {
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.55, minTrackingConfidence: 0.55 });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 480, height: 640
        });
        camera.start();
    }

    window.addEventListener('resize', () => {
        if(camera3d) {
            camera3d.aspect = window.innerWidth / window.innerHeight;
            camera3d.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    });
</script>
</body>
</html>
